<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Fines — LibraryMS Member</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .fine-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .fine-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .fine-card-label {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .fine-card-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }
    .fine-card.danger .fine-card-value {
      color: var(--danger);
    }
    .tab-bar { display:flex; gap:8px; margin-bottom:20px; }
    .tab-btn {
      padding:8px 18px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface); color:var(--text-muted); cursor:pointer;
      font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500;
      transition:all 0.2s;
    }
    .tab-btn.active { background:var(--accent); color:#111; border-color:var(--accent); font-weight:600; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-book-open"></i><span>LibraryMS</span></div>
    <nav class="sidebar-nav">
      <a href="/member-dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="/member-books" class="nav-item"><i class="fa-solid fa-book"></i> Browse Books</a>
      <a href="/member-borrows" class="nav-item"><i class="fa-solid fa-arrow-right-arrow-left"></i> My Borrows</a>
      <a href="/member-fines" class="nav-item active"><i class="fa-solid fa-indian-rupee-sign"></i> My Fines</a>
    </nav>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div>
        <h1 class="page-title">My Fines</h1>
        <p class="page-sub">View your fine status and payment history</p>
      </div>
    </header>

    <div class="fine-summary">
      <div class="fine-card">
        <div class="fine-card-label">Total Fines</div>
        <div class="fine-card-value" id="total-fines">—</div>
      </div>
      <div class="fine-card danger">
        <div class="fine-card-label">Unpaid Fines</div>
        <div class="fine-card-value" id="unpaid-count">—</div>
      </div>
      <div class="fine-card danger">
        <div class="fine-card-label">Amount Due (Rs.)</div>
        <div class="fine-card-value" id="unpaid-amount">—</div>
      </div>
      <div class="fine-card">
        <div class="fine-card-label">Total Paid (Rs.)</div>
        <div class="fine-card-value" id="total-paid">—</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">All Fines</button>
      <button class="tab-btn" id="tab-unpaid" onclick="switchTab('unpaid')">Unpaid Only</button>
      <button class="tab-btn" id="tab-paid" onclick="switchTab('paid')">Paid History</button>
    </div>

    <section class="section-card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Book Title</th><th>Due Date</th>
              <th>Amount (Rs.)</th><th>Status</th><th>Paid On</th>
            </tr>
          </thead>
          <tbody id="fines-tbody">
            <tr><td colspan="6" class="loading-row">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="static/js/auth-guard.js"></script>
  <script src="static/js/member-fines.js"></script>
</body>
</html>
