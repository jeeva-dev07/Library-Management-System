<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — LibraryMS</title>

  <link rel="stylesheet" href="/static/css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-page">

<div class="login-box">

  <div class="login-logo">
    <i class="fa-solid fa-book-open-reader"></i>
    <h1>LibraryMS</h1>
    <p>Create Account</p>
  </div>

  <div class="login-form">

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter email">
    </div>

    <div class="form-group" id="password-group">
      <label>Password</label>
      <input type="password" id="password" autocomplete="new-password" placeholder="Enter password">
    </div>

    <div id="member-note" style="display:none;">
      <p style="color:var(--text-muted);font-size:13px;background:rgba(99,102,241,0.1);padding:10px 14px;border-radius:8px;margin:0 0 12px;">
        <i class="fa-solid fa-circle-info" style="color:var(--accent)"></i>
        Members don't need a password. Log in using your full name and email.
      </p>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role" onchange="togglePasswordField()">
        <option value="member">Member</option>
        <option value="librarian">Librarian</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div id="register-error" class="login-error"></div>

    <button class="btn-primary" onclick="registerUser()">
      <i class="fa-solid fa-user-plus"></i>
      Register
    </button>

    <div style="text-align:center;margin-top:15px;">
      <a href="/">Already have an account? Login</a>
    </div>

  </div>

</div>

<script src="/static/js/register.js"></script>
<script>
  function togglePasswordField() {
    const isMember = document.getElementById('role').value === 'member';
    document.getElementById('password-group').style.display = isMember ? 'none' : 'block';
    document.getElementById('member-note').style.display    = isMember ? 'block' : 'none';
    if (isMember) document.getElementById('password').value = '';
  }
  togglePasswordField(); // run on load since member is default
</script>

</body>
</html>
