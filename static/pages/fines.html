<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fines — LibraryMS</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .tab-bar { display:flex; gap:8px; margin-bottom:20px; }
    .tab-btn {
      padding:8px 18px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface); color:var(--text-muted); cursor:pointer;
      font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500;
      transition:all 0.2s;
    }
    .tab-btn.active { background:var(--accent); color:#111; border-color:var(--accent); font-weight:600; }
    .collected-banner {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px 24px;
      margin-bottom:20px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .collected-banner i { color:var(--success); font-size:22px; }
    .collected-banner span { color:var(--text-muted); font-size:13px; }
    .collected-banner strong { font-size:22px; color:var(--success); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-book-open"></i><span>LibraryMS</span></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="/books-page"     class="nav-item"><i class="fa-solid fa-book"></i> Books</a>
      <a href="/members-page"   class="nav-item"><i class="fa-solid fa-users"></i> Members</a>
      <a href="/borrows-page"   class="nav-item"><i class="fa-solid fa-arrow-right-arrow-left"></i> Borrows</a>
      <a href="/fines-page"     class="nav-item active"><i class="fa-solid fa-indian-rupee-sign"></i> Fines</a>
    </nav>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div>
        <h1 class="page-title">Fines</h1>
        <p class="page-sub">Manage overdue fines and payments</p>
      </div>
    </header>

    <div class="collected-banner">
      <i class="fa-solid fa-circle-check"></i>
      <div>
        <span>Total Fines Collected</span><br/>
        <strong id="total-collected">—</strong>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-all"    onclick="filterFines('all')">All Fines</button>
      <button class="tab-btn"        id="tab-unpaid" onclick="filterFines('unpaid')">Unpaid Only</button>
    </div>

    <section class="section-card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Member</th><th>Book</th>
              <th>Amount (Rs.)</th><th>Status</th><th>Paid On</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="fines-tbody">
            <tr><td colspan="7" class="loading-row">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="static/js/auth-guard.js"></script>
  <script src="static/js/fines.js"></script>
</body>
</html>
