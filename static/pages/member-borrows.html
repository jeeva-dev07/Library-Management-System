<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Borrows — LibraryMS Member</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .tab-bar { display:flex; gap:8px; margin-bottom:20px; }
    .tab-btn {
      padding:8px 18px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface); color:var(--text-muted); cursor:pointer;
      font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500;
      transition:all 0.2s;
    }
    .tab-btn.active { background:var(--accent); color:#111; border-color:var(--accent); font-weight:600; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-book-open"></i><span>LibraryMS</span></div>
    <nav class="sidebar-nav">
      <a href="/member-dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="/member-books" class="nav-item"><i class="fa-solid fa-book"></i> Browse Books</a>
      <a href="/member-borrows" class="nav-item active"><i class="fa-solid fa-arrow-right-arrow-left"></i> My Borrows</a>
      <a href="/member-fines" class="nav-item"><i class="fa-solid fa-indian-rupee-sign"></i> My Fines</a>
    </nav>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div>
        <h1 class="page-title">My Borrows</h1>
        <p class="page-sub">Track your current and past borrows</p>
      </div>
    </header>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">Active Borrows</button>
      <button class="tab-btn" id="tab-history" onclick="switchTab('history')">History</button>
    </div>

    <section class="section-card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Book Title</th><th>Author</th>
              <th>Borrow Date</th><th>Due Date</th><th>Status</th><th>Days Overdue</th>
            </tr>
          </thead>
          <tbody id="borrows-tbody">
            <tr><td colspan="7" class="loading-row">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="static/js/auth-guard.js"></script>
  <script src="static/js/member-borrows.js"></script>
</body>
</html>
