<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — LibraryMS</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .login-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }
    .login-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .login-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <i class="fa-solid fa-book-open-reader"></i>
      <h1>LibraryMS</h1>
      <p>Library Management System</p>
    </div>

    <div class="login-tabs">
      <div class="login-tab active" onclick="switchTab('staff')" id="tab-staff">
        <i class="fa-solid fa-user-tie"></i> Staff Login
      </div>
      <div class="login-tab" onclick="switchTab('member')" id="tab-member">
        <i class="fa-solid fa-user"></i> Member Login
      </div>
    </div>

    <!-- STAFF TAB -->
    <div class="tab-panel active" id="panel-staff">
      <div class="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="staff-email" placeholder="Enter your email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="staff-password" placeholder="Enter your password"/>
        </div>
        <div id="staff-error" class="login-error"></div>
        <button class="btn-primary" onclick="staffLogin()">
          <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
        <div style="text-align:center;margin-top:15px;">
          <span style="color:var(--text-muted)">New user?</span>
          <a href="/register-page" style="color:var(--accent);text-decoration:none;"> Create Account</a>
        </div>
      </div>
    </div>

    <!-- MEMBER TAB -->
    <div class="tab-panel" id="panel-member">
      <div class="login-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="member-name" placeholder="Enter your full name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="member-email" placeholder="Enter your email"/>
        </div>
        <div id="member-error" class="login-error"></div>
        <button class="btn-primary" onclick="memberLogin()">
          <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
        <div style="text-align:center;margin-top:15px;color:var(--text-muted);font-size:13px;">
          <i class="fa-solid fa-circle-info"></i> Use the name and email registered by your librarian
        </div>
      </div>
    </div>

  </div>
  <script src="static/js/login.js"></script>
</body>
</html>
