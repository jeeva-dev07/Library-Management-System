<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Borrows — LibraryMS</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .tab-bar { display:flex; gap:8px; margin-bottom:20px; }
    .tab-btn {
      padding:8px 18px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface); color:var(--text-muted); cursor:pointer;
      font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500;
      transition:all 0.2s;
    }
    .tab-btn.active { background:var(--accent); color:#111; border-color:var(--accent); font-weight:600; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-book-open"></i><span>LibraryMS</span></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="/books-page"     class="nav-item"><i class="fa-solid fa-book"></i> Books</a>
      <a href="/members-page"   class="nav-item"><i class="fa-solid fa-users"></i> Members</a>
      <a href="/borrows-page"   class="nav-item active"><i class="fa-solid fa-arrow-right-arrow-left"></i> Borrows</a>
      <a href="/fines-page"     class="nav-item"><i class="fa-solid fa-indian-rupee-sign"></i> Fines</a>
    </nav>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div>
        <h1 class="page-title">Borrows</h1>
        <p class="page-sub">Track issued and overdue books</p>
      </div>
      <button class="btn-primary" onclick="openIssueModal()"><i class="fa-solid fa-plus"></i> Issue Book</button>
    </header>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-active"  onclick="switchTab('active')">Active Borrows</button>
      <button class="tab-btn"        id="tab-overdue" onclick="switchTab('overdue')">Overdue</button>
    </div>

    <section class="section-card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Member</th><th>Book</th>
              <th>Borrow Date</th><th>Due Date</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="borrows-tbody">
            <tr><td colspan="7" class="loading-row">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ISSUE MODAL -->
  <div class="modal-overlay" id="issue-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Issue Book</h3>
        <button class="modal-close" onclick="closeIssueModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Member ID *</label>
          <input type="number" id="issue-member" placeholder="Enter member ID"/>
        </div>
        <div class="form-group">
          <label>Book ID *</label>
          <input type="number" id="issue-book" placeholder="Enter book ID"/>
        </div>
        <p style="font-size:12px;color:var(--text-muted)">Due date will be set to 14 days from today.</p>
        <div id="issue-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeIssueModal()">Cancel</button>
        <button class="btn-primary" onclick="issueBook()">Issue Book</button>
      </div>
    </div>
  </div>

  <!-- RETURN CONFIRM MODAL -->
  <div class="modal-overlay" id="return-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Process Return</h3>
        <button class="modal-close" onclick="closeReturnModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p>Return <strong id="return-book-name"></strong> from <strong id="return-member-name"></strong>?</p>
        <p style="font-size:12px;color:var(--text-muted);margin-top:8px">A fine will be automatically calculated if overdue.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeReturnModal()">Cancel</button>
        <button class="btn-primary" onclick="processReturn()">Confirm Return</button>
      </div>
    </div>
  </div>

  <script src="static/js/auth-guard.js"></script>
  <script src="static/js/borrows.js"></script>
</body>
</html>
