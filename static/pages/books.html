<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Books — LibraryMS</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-book-open"></i><span>LibraryMS</span></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="/books-page"     class="nav-item active"><i class="fa-solid fa-book"></i> Books</a>
      <a href="/members-page"   class="nav-item"><i class="fa-solid fa-users"></i> Members</a>
      <a href="/borrows-page"   class="nav-item"><i class="fa-solid fa-arrow-right-arrow-left"></i> Borrows</a>
      <a href="/fines-page"     class="nav-item"><i class="fa-solid fa-indian-rupee-sign"></i> Fines</a>
    </nav>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div>
        <h1 class="page-title">Books</h1>
        <p class="page-sub">Manage your library collection</p>
      </div>
      <button class="btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add Book</button>
    </header>

    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="search-input" placeholder="Search by title, author, or genre..." oninput="searchBooks()"/>
    </div>

    <section class="section-card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Title</th><th>Author</th><th>Genre</th>
              <th>ISBN</th><th>Total</th><th>Available</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="books-tbody">
            <tr><td colspan="8" class="loading-row">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="book-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Book</h3>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="book-id"/>
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="book-title" placeholder="Book title"/>
        </div>
        <div class="form-group">
          <label>Author *</label>
          <input type="text" id="book-author" placeholder="Author name"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Genre</label>
            <input type="text" id="book-genre" placeholder="Genre"/>
          </div>
          <div class="form-group">
            <label>ISBN</label>
            <input type="text" id="book-isbn" placeholder="ISBN"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Total Copies *</label>
            <input type="number" id="book-total" min="1" value="1"/>
          </div>
          <div class="form-group">
            <label>Available Copies</label>
            <input type="number" id="book-available" min="0" value="1"/>
          </div>
        </div>
        <div id="form-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveBook()">Save Book</button>
      </div>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Delete Book</h3>
        <button class="modal-close" onclick="closeDeleteModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong id="delete-book-name"></strong>?</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="static/js/auth-guard.js"></script>
  <script src="static/js/books.js"></script>
</body>
</html>
